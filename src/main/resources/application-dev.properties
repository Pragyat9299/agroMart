# ===== MySQL Database (Local Development) =====
spring.datasource.url=jdbc:mysql://localhost:3306/agrodb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=local
spring.datasource.password=password

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT Configuration =====
app.jwt.secret=dev-secret-key-change-in-production-must-be-at-least-256-bits-long-for-hs256
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ===== Server =====
server.port=8080

# ===== CORS =====
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ===== File Upload Limits =====
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
