# ===== Production Configuration =====
# All sensitive values come from environment variables (set in Render dashboard)

# ===== MySQL Database (Remote — Aiven / PlanetScale / Railway) =====
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== Connection Pool (HikariCP) =====
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===== JWT Configuration =====
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ===== Server =====
server.port=${PORT:8080}

# ===== CORS =====
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# ===== File Upload Limits =====
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===== Performance Tuning (Free Tier Optimization) =====
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=100
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript
server.compression.min-response-size=1024

# ===== Logging =====
logging.level.root=WARN
logging.level.com.agronomy.agro=INFO
logging.level.org.hibernate.SQL=WARN
